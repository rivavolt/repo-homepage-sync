apiVersion: v1
kind: ServiceAccount
metadata:
  name: repo-homepage-sync
  namespace: repo-homepage-sync
---
# Least privilege: the controller only needs to WATCH/LIST Ingresses (its
# reactive trigger + the served hosts) and LIST/GET ArgoCD Applications
# (app -> source repo mapping). No write verbs anywhere in the cluster — the
# only mutation it performs is the GitHub repo-homepage PATCH, off-cluster.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: repo-homepage-sync
rules:
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: repo-homepage-sync
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: repo-homepage-sync
subjects:
  - kind: ServiceAccount
    name: repo-homepage-sync
    namespace: repo-homepage-sync
